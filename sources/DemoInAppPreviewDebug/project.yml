name: DemoInAppPreviewDebug
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "16.0"
settings:
  base:
    SWIFT_VERSION: 5.9
packages:
  DemoInAppPreviewDebugUI:
    path: .
targets:
  DemoInAppPreviewDebug:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: DemoInAppPreviewDebug
    dependencies:
      - package: DemoInAppPreviewDebugUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.demoinapppreviewdebug
        INFOPLIST_FILE: DemoInAppPreviewDebug/Info.plist
  DemoInAppPreviewDebugUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: DemoInAppPreviewDebugUITests
    dependencies:
      - target: DemoInAppPreviewDebug
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.demoinapppreviewdebug.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: DemoInAppPreviewDebug
schemes:
  DemoInAppPreviewDebug:
    build:
      targets:
        DemoInAppPreviewDebug: all
    test:
      targets:
        - name: DemoInAppPreviewDebugUITests
