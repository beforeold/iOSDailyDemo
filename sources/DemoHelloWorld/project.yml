name: DemoHelloWorld
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "16.0"
settings:
  base:
    SWIFT_VERSION: 5.9
targets:
  DemoHelloWorld:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: DemoHelloWorld
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.demohelloworld
        INFOPLIST_FILE: DemoHelloWorld/Info.plist
  DemoHelloWorldUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: DemoHelloWorldUITests
    dependencies:
      - target: DemoHelloWorld
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.demohelloworld.uitests
schemes:
  DemoHelloWorld:
    build:
      targets:
        DemoHelloWorld: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - name: DemoHelloWorldUITests
